mupgrade-disable=[color=255,125,0]OSTRZEŻENIE[/color] Wyłączenie ulepszeń maszyn spowoduje, że wszystkie efekty technologii ulepszeń maszyn (np. Automaty montażowe +10% produktywności) przestaną działać. Używaj tego tylko jeśli:\n1) Gra ulega awarii, a raport o błędzie nakazuje włączenie tego ustawienia,\n2) Zgłosiłeś już awarię odpowiedniemu twórcy modyfikacji i czekasz na poprawkę,\n3) ORAZ Machine Upgrades jest zależnością innego moda.\nTo ręczne nadpisanie służy wyłącznie w sytuacjach awaryjnych. Domyślnie wyłączone.
